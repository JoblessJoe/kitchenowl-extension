<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KitchenOwl Importer — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Settings</h1>

      <section id="logged-out" class="hidden">
        <p class="lead">You're not logged in. Open the extension from the toolbar to log in to your KitchenOwl server.</p>
      </section>

      <section id="logged-in" class="hidden">
        <dl class="account">
          <dt>Server</dt>
          <dd id="acc-server">—</dd>
          <dt>Account</dt>
          <dd id="acc-user">—</dd>
        </dl>

        <label class="field">
          <span>Household</span>
          <div class="household-row">
            <select id="household" class="grow"></select>
            <button id="save-household" type="button" class="btn-primary">Save</button>
          </div>
          <small>Recipes you save are added to this household.</small>
        </label>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <hr />
        <button id="logout" type="button" class="btn-danger">Log out</button>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
